<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZYRA — Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;
         background:linear-gradient(135deg,#0f0f0f,#3a1c00);font-family:'Poppins',sans-serif;}
    .card{background:#1a1a1a;border:1px solid rgba(212,175,55,0.35);border-radius:16px;
          padding:50px 40px;width:380px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.6);}
    .brand{font-family:'Playfair Display',serif;font-size:2.4rem;color:#d4af37;letter-spacing:4px;margin-bottom:6px;}
    .tagline{font-size:0.75rem;color:#888;letter-spacing:2px;text-transform:uppercase;margin-bottom:32px;}
    h2{color:#fff;font-size:1.1rem;font-weight:400;margin-bottom:24px;letter-spacing:1px;}
    input{width:100%;padding:12px 16px;margin-bottom:14px;border-radius:8px;
          border:1px solid #333;background:#111;color:#fff;font-size:0.9rem;font-family:'Poppins',sans-serif;}
    input:focus{outline:none;border-color:#d4af37;}
    input::placeholder{color:#555;}
    button{width:100%;padding:13px;background:#d4af37;border:none;border-radius:8px;
           color:#000;font-weight:700;font-size:0.95rem;letter-spacing:1px;cursor:pointer;transition:0.3s;margin-top:6px;}
    button:hover{background:#b8962e;}
    .msg{font-size:0.82rem;margin-top:10px;min-height:18px;}
    .msg.error{color:#ff6b6b;}
    .msg.success{color:#7fff7f;}
    .footer-link{margin-top:22px;font-size:0.82rem;color:#888;}
    .footer-link a{color:#d4af37;text-decoration:none;font-weight:600;}
    .footer-link a:hover{text-decoration:underline;}
    .divider{border:none;border-top:1px solid #2a2a2a;margin:20px 0;}
  </style>
</head>
<body>
<div class="card">
  <div class="brand">ZYRA</div>
  <div class="tagline">Luxury Fashion</div>
  <h2>Create Your Account</h2>
  <form onsubmit="signupUser(event)">
    <input type="text"  id="signupName"     placeholder="Full name" required>
    <input type="email" id="signupEmail"    placeholder="Email address" required>
    <input type="password" id="signupPass"  placeholder="Password (min 6 chars)" minlength="6" required>
    <input type="password" id="signupPass2" placeholder="Confirm password" required>
    <button type="submit">CREATE ACCOUNT</button>
    <p class="msg" id="signupMsg"></p>
  </form>
  <hr class="divider">
  <div class="footer-link">Already have an account? <a href="login.html">Sign in</a></div>
</div>

<script>
function signupUser(e) {
  e.preventDefault();
  const name  = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const pass  = document.getElementById('signupPass').value;
  const pass2 = document.getElementById('signupPass2').value;
  const msg   = document.getElementById('signupMsg');

  if (pass !== pass2) {
    msg.className = 'msg error';
    msg.innerText = '⚠️ Passwords do not match.';
    return;
  }
  const users = JSON.parse(localStorage.getItem('zyra_users')) || [];
  if (users.find(u => u.email === email)) {
    msg.className = 'msg error';
    msg.innerText = '⚠️ An account with this email already exists.';
    return;
  }
  users.push({ name, email, password: pass });
  localStorage.setItem('zyra_users', JSON.stringify(users));
  localStorage.setItem('currentUser', JSON.stringify({ name, email }));
  msg.className = 'msg success';
  msg.innerText = '✅ Account created! Redirecting...';
  setTimeout(() => window.location.href = 'index.html', 1200);
}
</script>
</body>
</html>
