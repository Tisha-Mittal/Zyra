  <style>
    .product-page-container{padding:40px 5%;max-width:1200px;margin:auto;}
    .page-title{font-family:'Playfair Display',serif;text-align:center;font-size:2.8rem;
                margin-bottom:8px;color:#111;text-transform:uppercase;}
    .page-subtitle{text-align:center;color:#666;margin-bottom:40px;font-style:italic;}
    .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:30px;}
    .product-card{background:#fff;padding:20px;border-radius:14px;border:1px solid #f0f0f0;
                  transition:0.4s;text-align:center;}
    .product-card:hover{transform:translateY(-8px);box-shadow:0 15px 30px rgba(0,0,0,0.1);}
    .product-card img{width:100%;height:300px;object-fit:cover;border-radius:10px;margin-bottom:14px;}
    .product-card h3{font-size:1.2rem;margin-bottom:6px;color:#222;}
    .product-desc{font-size:0.88rem;color:#777;margin-bottom:12px;line-height:1.4;}
    .product-fabric{font-size:0.78rem;color:#555;font-weight:600;text-transform:uppercase;
                    letter-spacing:0.5px;margin:4px 0 8px;}
    .product-price{font-size:1.2rem;font-weight:700;color:#8b0000;margin-bottom:14px;}
    .size-container{display:flex;justify-content:center;gap:5px;margin:8px 0;flex-wrap:wrap;}
    .size-chip{border:1px solid #ddd;padding:3px 8px;font-size:0.75rem;border-radius:4px;
               color:#444;transition:0.2s;cursor:pointer;}
    .size-chip:hover{border-color:#8b0000;background:#fff0f0;}
    .buy-btn-large{width:100%;background:#111;color:#fff;border:none;padding:12px;
                   border-radius:6px;cursor:pointer;font-weight:600;letter-spacing:1px;
                   text-transform:uppercase;transition:0.3s;font-family:'Poppins',sans-serif;}
    .buy-btn-large:hover{background:#d4af37;color:#000;}
    .back-link{text-decoration:none;color:#d4af37;font-weight:600;
               display:inline-flex;align-items:center;gap:6px;margin-bottom:24px;font-size:0.9rem;}
    .empty-state{text-align:center;padding:80px 20px;color:#888;font-size:1.1rem;}
    /* header overrides for products page */
    .header .nav a{background:#fff;color:#000;}
    #cart-count{background:red;color:#fff;font-size:11px;padding:2px 6px;
                border-radius:50%;margin-left:4px;font-weight:700;}
  </style>

// ── Helpers ───────────────────────────────────────────────────
const CART_KEY = 'zyracart';
function getCart()       { return JSON.parse(localStorage.getItem(CART_KEY)) || []; }
function saveCart(c)     { localStorage.setItem(CART_KEY, JSON.stringify(c)); }

function updateCartCount() {
  const count = getCart().reduce((t, i) => t + i.quantity, 0);
  const el = document.getElementById('cart-count');
  if (el) el.innerText = count;
}

function addToCart(name, price) {
  const cart     = getCart();
  const existing = cart.find(i => i.name === name);
  if (existing) { existing.quantity += 1; } else { cart.push({ name, price, quantity: 1 }); }
  saveCart(cart);
  updateCartCount();
  showToast('🛍️ ' + name + ' added to bag!');
}

function showToast(msg) {
  const old = document.querySelector('.toast-notification');
  if (old) old.remove();
  const t = document.createElement('div');
  t.className = 'toast-notification';
  t.innerText = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function toggleMode() { document.body.classList.toggle('dark-mode'); }
function logout()     { localStorage.removeItem('currentUser'); window.location.href = 'login.html'; }

// ── Init ─────────────────────────────────────────────────────
function initPage() {
  updateCartCount();
  const catKey   = new URLSearchParams(window.location.search).get('cat');
  const category = productData[catKey];
  const list     = document.getElementById('product-list');

  if (category) {
    document.getElementById('cat-name').innerText = category.title;
    document.getElementById('cat-desc').innerText = category.description;
    document.title = 'ZYRA — ' + category.title;
    list.innerHTML = '';

    category.items.forEach(item => {
      const safeName = item.name.replace(/'/g, "\\'");
      const sizes    = (item.sizes || []).map(s => `<span class="size-chip">${s}</span>`).join('');
      const card     = document.createElement('div');
      card.className = 'product-card';
      card.innerHTML = `
        <img src="${item.img}" alt="${item.name}" loading="lazy"
             onerror="this.src='https://picsum.photos/seed/${encodeURIComponent(item.name)}/400/300'">
        <h3>${item.name}</h3>
        ${item.fabric ? `<p class="product-fabric">${item.fabric}</p>` : ''}
        <p class="product-desc">${item.desc}</p>
        ${sizes ? `<div class="size-container">${sizes}</div>` : ''}
        <div class="product-price">&#8377;${Number(item.price).toLocaleString('en-IN')}</div>
        <button class="buy-btn-large" onclick="addToCart('${safeName}', ${item.price})">ADD TO BAG</button>`;
      list.appendChild(card);
    });
  } else {
    list.innerHTML = '<div class="empty-state">✨ This collection is coming soon!</div>';
  }
}

window.onload = initPage;
